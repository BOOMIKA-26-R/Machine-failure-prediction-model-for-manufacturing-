name: Full MLOps Auto-Retrain

on:
  push:
    paths:
      - 'machine_data.csv' # Triggers automatically when you upload new data
  workflow_dispatch:      # Allows manual trigger

jobs:
  retrain_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trainer
        run: |
          pip install pandas scikit-learn joblib numpy
          python train.py

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push New Image
        run: |
          docker build -t boomika26/machine-failure:latest .
          docker push boomika26/machine-failure:latest
          
      - name: Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
